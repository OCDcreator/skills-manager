name: Build Artifacts

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows artifact

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        with:
          args: --target x86_64-pc-windows-msvc --config src-tauri/tauri.artifacts.conf.json

      - name: Upload Windows installers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: skills-manager-windows-${{ github.sha }}
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Publish development release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEV_RELEASE_TAG: dev-latest
        run: |
          $ErrorActionPreference = "Stop"

          $assets = @(
            Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi" -File -ErrorAction SilentlyContinue
            Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" -File -ErrorAction SilentlyContinue
          )

          if ($assets.Count -eq 0) {
            throw "No Windows installer assets found."
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $env:DEV_RELEASE_TAG $env:GITHUB_SHA
          git push --force origin "refs/tags/$($env:DEV_RELEASE_TAG)"

          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $runUrl = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $notes = @"
          Development build from the latest main branch.

          Commit: $shortSha
          Workflow run: $runUrl

          This prerelease is overwritten by each push to main.
          "@
          Set-Content -Path release-notes.md -Value $notes -Encoding utf8

          gh release view $env:DEV_RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            $existingAssetNames = gh release view $env:DEV_RELEASE_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --json assets `
              --jq ".assets[].name"

            foreach ($assetName in $existingAssetNames) {
              if ($assetName) {
                gh release delete-asset $env:DEV_RELEASE_TAG $assetName --repo $env:GITHUB_REPOSITORY --yes
              }
            }

            gh release edit $env:DEV_RELEASE_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --title "Skills Manager dev-latest" `
              --notes-file release-notes.md `
              --prerelease `
              --target $env:GITHUB_SHA
          } else {
            gh release create $env:DEV_RELEASE_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --title "Skills Manager dev-latest" `
              --notes-file release-notes.md `
              --prerelease `
              --latest=false `
              --target $env:GITHUB_SHA
          }

          $assetPaths = $assets | ForEach-Object { $_.FullName }
          gh release upload $env:DEV_RELEASE_TAG $assetPaths --repo $env:GITHUB_REPOSITORY --clobber
